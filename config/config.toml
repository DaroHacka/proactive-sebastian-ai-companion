[user]
name = "Daniel"
email = "your_email@gmail.com"

[paths]
library = "library"
appointments = "appointments"
memory = "memory"
config = "config"

[ollama]
url = "http://localhost:11434"
model = "phi4"
available_models = ["phi4", "gemma4:26b"]

[system]
proactive_mode = true
proactive_on_launch = true   # true = proactive ON at launch, false = OFF at launch
appointment_mode = true
memory_in_prompt = false
test_mode = true
ai_timeout_seconds = 600  # 10 minutes

[startup]
proactive_on_startup = true
appointment_on_startup = true

[user_input]
# Chance of combo trigger when user sends a message (0.0 to 1.0)
# To introduce unexpected, lively interactions into the conversation.
# 0.20 = 20% chance per message
combo_trigger_chance = 0.20

# Enable/disable combo triggering on user messages
# Set to false to disable combo responses when user sends messages
combo_on_user_message = true

[timing]
scheduler_interval_minutes = 10
proactive_check_seconds = 60  # Changed from 30 for power efficiency
appointment_check_seconds = 60  # Changed from 30 for power efficiency

[vibe]
day_commentary_chance = 0.10
weekend_longing_chance = 0.10

[weather]
location = "San_Gregorio_nelle_Alpi"  # User's location for wttr.in
# c4 distribution weights (must sum to 1.0)
explicit_only_weight = 0.50    # 50%: only explicit mention (c4_explicit_mention.txt)
both_weight = 0.25              # 25%: both explicit + mood-based
mood_only_weight = 0.25         # 25%: only mood-based (c4-weather-impulse.txt)

[combo_config]
# Dial 1: How many libraries per combo? (must sum to 1.0)
combo_size_weights = {1 = 0.50, 2 = 0.30, 3 = 0.20}

# Dial 2: Library relevance weights (higher = more likely)
# All libraries are treated equally - set value to control relevance
[combo_config.library_relevance]
a = 1.0    # intent
b = 1.0    # cue
c = 1.0    # vibe
d = 1.0    # initiative (auto-discovered)
e = 1.0    # books (auto-discovered)
# Add more as auto-discovered: f, g, h, etc.

[libraries]
  [libraries.a]
    weight_bias = 1.0
    max_combo = 3
    enabled = true
  
  [libraries.b]
    weight_bias = 1.0
    max_combo = 3
    enabled = true
  
  [libraries.c]
    weight_bias = 2.0
    max_combo = 3
    enabled = true

[schedule]
contacts_sparse_min = 2
contacts_sparse_max = 4
contacts_active_min = 5
contacts_active_max = 15
active_day_percentage = 0.30
frequency = 3  # 1-10 scale (3 = light schedule, 5 = balanced, 10 = maximum)

[schedule.distribution]
# Time-based distribution for proactive contacts (must sum to 1.0)
# Users can customize the hour ranges
early_morning_start = 0
early_morning_end = 6
early_morning_weight = 0.10

morning_start = 6
morning_end = 12
morning_weight = 0.30

afternoon_start = 12
afternoon_end = 18
afternoon_weight = 0.40

evening_start = 18
evening_end = 22
evening_weight = 0.15

night_start = 22
night_end = 24
night_weight = 0.05
